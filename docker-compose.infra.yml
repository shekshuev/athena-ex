version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: athena-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: athena_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - athena-network

  postgres-runner:
    image: postgres:15-alpine
    container_name: athena-postgres-runner
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: athena_runner
    ports:
      - "5433:5432"
    volumes:
      - postgres_runner_data:/var/lib/postgresql/data
    networks:
      - athena-network

  minio:
    image: minio/minio
    container_name: athena-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - athena-network

networks:
  athena-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_runner_data:
  minio_data:
